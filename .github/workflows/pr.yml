name: PR Checks

on:
  pull_request:
    branches:
      - master

jobs:
  checks:
    name: 'PR Checks'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.15.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=verbose
        timeout-minutes: 10

      - name: Build / Lint
        run: pnpm nx run-many -t build,lint
